route:
  receiver: telegram
  group_by: [alertname]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="P1"]
      receiver: telegram
      repeat_interval: 30m

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: ${TELEGRAM_BOT_TOKEN}
        chat_id: ${TELEGRAM_ALLOWED_CHAT_ID}
        parse_mode: ""
        message: '{{ range .Alerts }}🔔 {{ .Labels.severity }} {{ .Annotations.summary }}{{ "\n" }}{{ end }}'

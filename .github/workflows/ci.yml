name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run ruff check libs services tests

      - name: Ruff format check
        run: uv run ruff format --check libs services tests

      - name: Mypy
        run: uv run mypy libs services

      - name: Unit tests
        run: uv run pytest --cov --cov-report=term

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_DB: trading
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trading" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          POSTGRES_HOST: localhost
      - name: Integration tests
        run: uv run pytest -m integration
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost

  docker-build:
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      matrix:
        service: [recorder, scheduler, api, telegram]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: >
          docker build -f infrastructure/docker/Dockerfile
          --build-arg SERVICE=${{ matrix.service }} -t tp-${{ matrix.service }}:ci .
